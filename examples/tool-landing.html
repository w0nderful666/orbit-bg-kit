<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Landing — Orbit Background Kit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    color: #e8e6e3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 700px;
  }
  .badge {
    display: inline-block;
    padding: 4px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    font-size: 12px;
    color: #888;
    margin-bottom: 24px;
  }
  h1 {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 16px;
  }
  h1 span {
    background: linear-gradient(135deg, #6e8efb, #a777e3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .desc { font-size: 18px; color: #888; line-height: 1.6; margin-bottom: 32px; }
  .buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn {
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #6e8efb, #a777e3);
    color: #fff;
    border: none;
  }
  .btn-secondary {
    background: transparent;
    color: #e8e6e3;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<!-- Glass theme — SaaS / AI tool landing page -->
<script src="../dist/orbit-bg.iife.js"></script>
<orbit-bg
  words="AI,INTELLIGENCE,AUTOMATE,WORKFLOW"
  theme="glass"
  speed="normal"
  opacity="0.07"
  grid="true"
  glow="true"
  noise="true"
  beams="true"
  interactive="true"
  font="sans"
></orbit-bg>

<div class="hero">
  <div class="badge">✨ Now in public beta</div>
  <h1>Build smarter with <span>AI workflows</span></h1>
  <p class="desc">Automate your creative process. One-click integrations, zero learning curve.</p>
  <div class="buttons">
    <a href="#" class="btn btn-primary">Get Started Free</a>
    <a href="#" class="btn btn-secondary">View Demo</a>
  </div>
</div>

</body>
</html>
