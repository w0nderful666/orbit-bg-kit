<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Orbit Background Kit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    color: #3a3632;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 600px;
  }
  h1 { font-size: 48px; font-weight: 400; margin-bottom: 8px; letter-spacing: -0.02em; }
  .subtitle { font-size: 16px; color: #888; margin-bottom: 40px; }
  .projects { text-align: left; }
  .project {
    padding: 20px 0;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }
  .project h3 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .project p { font-size: 14px; color: #888; }
</style>
</head>
<body>

<!-- Paper theme with serif font — portfolio style -->
<script src="../dist/orbit-bg.iife.js"></script>
<orbit-bg
  words="DESIGN,DEVELOP,DELIVER"
  theme="paper"
  speed="slow"
  opacity="0.04"
  font="serif"
  intensity="soft"
  grid="false"
  glow="true"
  noise="true"
  vignette="true"
></orbit-bg>

<div class="content">
  <h1>Jane Doe</h1>
  <p class="subtitle">Designer & Developer</p>
  <div class="projects">
    <div class="project">
      <h3>Project Alpha</h3>
      <p>A design system for modern web applications</p>
    </div>
    <div class="project">
      <h3>Project Beta</h3>
      <p>Open source tools for creative developers</p>
    </div>
    <div class="project">
      <h3>Project Gamma</h3>
      <p>Interactive data visualization platform</p>
    </div>
  </div>
</div>

</body>
</html>
