<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Theme — Orbit Background Kit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #d4e0ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .content { position: relative; z-index: 1; text-align: center; padding: 40px; }
  h1 { font-size: 42px; font-weight: 800; margin-bottom: 16px; }
  p { font-size: 18px; color: rgba(212,224,255,0.6); max-width: 480px; line-height: 1.6; }
</style>
</head>
<body>
<!-- Aurora theme: soft ethereal gradients with rings and beams -->
<script src="../dist/orbit-bg.iife.js"></script>
<orbit-bg words="CREATE,INSPIRE,DESIGN,SHOWCASE" theme="aurora" speed="normal" opacity="0.07" grid="false" glow="true" noise="true" rings="true" beams="true"></orbit-bg>
<div class="content">
  <h1>Aurora Theme</h1>
  <p>Ethereal gradients inspired by northern lights. Soft, modern, and captivating.</p>
</div>
</body>
</html>
