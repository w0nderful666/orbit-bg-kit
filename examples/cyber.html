<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Theme — Orbit Background Kit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #00ffcc;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px;
  }
  h1 { font-size: 42px; font-weight: 800; margin-bottom: 16px; }
  p { font-size: 18px; color: rgba(0,255,200,0.6); max-width: 480px; line-height: 1.6; }
</style>
</head>
<body>

<!-- Cyber theme: neon green on near-black -->
<script src="../dist/orbit-bg.iife.js"></script>
<orbit-bg
  words="HACK,BUILD,CREATE,INNOVATE"
  theme="cyber"
  speed="normal"
  opacity="0.08"
  grid="true"
  glow="true"
  noise="true"
  rings="true"
></orbit-bg>

<div class="content">
  <h1>Cyber Theme</h1>
  <p>Neon-infused dark aesthetic with orbit rings. Tasteful, not tacky.</p>
</div>

</body>
</html>
