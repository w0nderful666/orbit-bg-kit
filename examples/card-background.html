<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Background - Orbit Background Kit</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:28px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#10131a;color:white}.card{position:relative;overflow:hidden;border-radius:18px;min-height:360px;width:min(680px,100%);padding:32px;display:flex;align-items:flex-end;border:1px solid rgba(255,255,255,.12)}.card orbit-bg{border-radius:inherit}.content{position:relative;z-index:1}.content h1{font-size:clamp(30px,6vw,54px);margin:0 0 10px}.content p{color:#c7d0df;margin:0}
</style>
</head>
<body>
<script src="../dist/orbit-bg.iife.js"></script>
<section class="card">
  <orbit-bg position="absolute" z-index="0" theme="aurora" words="CARD,LOCAL,ORBIT" rounded></orbit-bg>
  <div class="content">
    <h1>Card Background</h1>
    <p>Use position="absolute" inside a positioned container.</p>
  </div>
</section>
</body>
</html>
