<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Background — Orbit Background Kit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #111;
    color: #e8e6e3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 24px;
    max-width: 900px;
    width: 100%;
  }
  .card {
    position: relative;        /* orbit-bg will use absolute positioning */
    border-radius: 16px;
    overflow: hidden;
    min-height: 280px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .card h3 {
    position: relative;
    z-index: 1;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .card p {
    position: relative;
    z-index: 1;
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    line-height: 1.5;
  }
  .label {
    position: relative;
    z-index: 1;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.4);
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<div class="grid">

  <!-- Card 1: Dark background -->
  <div class="card">
    <script src="../dist/orbit-bg.iife.js"></script>
    <orbit-bg
      words="ANALYZE,PREDICT,INSIGHT"
      theme="dark"
      speed="slow"
      opacity="0.08"
      position="absolute"
      grid="true"
      glow="true"
      noise="true"
      rounded="true"
      intensity="soft"
    ></orbit-bg>
    <div class="label">Analytics</div>
    <h3>Smart Predictions</h3>
    <p>AI-powered insights that adapt to your data patterns in real time.</p>
  </div>

  <!-- Card 2: Aurora background -->
  <div class="card">
    <orbit-bg
      words="CREATE,DESIGN,SHIP"
      theme="aurora"
      speed="normal"
      opacity="0.10"
      position="absolute"
      grid="false"
      glow="true"
      noise="true"
      rounded="true"
      rings="true"
    ></orbit-bg>
    <div class="label">Creative</div>
    <h3>Design Systems</h3>
    <p>Build beautiful interfaces with consistent, scalable components.</p>
  </div>

  <!-- Card 3: Sunset background -->
  <div class="card">
    <orbit-bg
      words="CONNECT,COLLABORATE,BUILD"
      theme="sunset"
      speed="slow"
      opacity="0.08"
      position="absolute"
      grid="false"
      glow="true"
      noise="true"
      rounded="true"
      beams="true"
    ></orbit-bg>
    <div class="label">Teamwork</div>
    <h3>Real-time Collab</h3>
    <p>Work together seamlessly. Changes sync instantly across all devices.</p>
  </div>

</div>

</body>
</html>
