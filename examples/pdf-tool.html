<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Tool Landing - Orbit Background Kit</title>
<style>
body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:#eef4ff;background:#050918}.hero{position:relative;z-index:1;min-height:100vh;display:grid;align-items:center;padding:48px 24px}.inner{max-width:980px;margin:0 auto}.badge{color:#7bd7c5;font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:12px}.hero h1{font-size:clamp(42px,8vw,84px);line-height:.95;margin:16px 0}.hero p{font-size:20px;color:#c0cbe0;max-width:620px}.tools{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:30px}.tool{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);border-radius:8px;padding:16px;font-weight:800}
</style>
</head>
<body>
<script src="../dist/orbit-bg.iife.js"></script>
<orbit-bg preset="pdf-tool" z-index="0"></orbit-bg>
<main class="hero">
  <div class="inner">
    <div class="badge">Private PDF tools</div>
    <h1>Merge, convert, and compress PDFs in your browser.</h1>
    <p>A fictional landing page showing how Orbit Background Kit can support a practical tool product without external assets.</p>
    <div class="tools"><div class="tool">Convert</div><div class="tool">Merge</div><div class="tool">Split</div><div class="tool">Compress</div></div>
  </div>
</main>
</body>
</html>
