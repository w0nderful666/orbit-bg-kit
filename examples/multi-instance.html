<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Instance - Orbit Background Kit</title>
<style>
body{margin:0;min-height:100vh;padding:42px 22px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#0f1218;color:#fff}h1{text-align:center;margin:0 0 30px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;max-width:980px;margin:0 auto}.card{position:relative;overflow:hidden;border-radius:16px;min-height:260px;padding:24px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid rgba(255,255,255,.12)}.card orbit-bg{border-radius:inherit}.card h2,.card p{position:relative;z-index:1}.card h2{margin:0 0 8px}.card p{margin:0;color:#c1c9d8}.note{text-align:center;color:#8c96a8;margin-top:26px}
</style>
</head>
<body>
<script src="../dist/orbit-bg.iife.js"></script>
<h1>Multiple orbit-bg Instances</h1>
<div class="grid">
  <section class="card"><orbit-bg position="absolute" z-index="0" preset="ai-startup" rounded></orbit-bg><h2>AI Startup</h2><p>Interactive glass style.</p></section>
  <section class="card"><orbit-bg position="absolute" z-index="0" preset="cyber-landing" rounded></orbit-bg><h2>Cyber Landing</h2><p>Fast neon motion.</p></section>
  <section class="card"><orbit-bg position="absolute" z-index="0" preset="paper-notes" rounded></orbit-bg><h2>Paper Notes</h2><p>Soft editorial texture.</p></section>
</div>
<p class="note">Each card owns an independent Shadow DOM and animation loop.</p>
</body>
</html>
