<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Market — Orbit Background Kit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #d4e0ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px; }
  .hero { position: relative; z-index: 1; text-align: center; max-width: 600px; }
  h1 { font-size: clamp(28px, 5vw, 44px); font-weight: 800; letter-spacing: -0.03em; margin-bottom: 12px; }
  .desc { font-size: 16px; color: rgba(212,224,255,0.6); line-height: 1.6; margin-bottom: 28px; }
  .cards { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .card { padding: 14px 20px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; font-size: 14px; }
</style>
</head>
<body>
<!-- Prompt market: aurora theme with rings -->
<script src="../dist/orbit-bg.iife.js"></script>
<orbit-bg preset="prompt-market"></orbit-bg>
<div class="hero">
  <h1>Prompt Marketplace</h1>
  <p class="desc">Discover, share, and sell AI prompts. Community-curated collections for every use case.</p>
  <div class="cards">
    <div class="card">🎨 Image Gen</div>
    <div class="card">✍️ Writing</div>
    <div class="card">💻 Code</div>
    <div class="card">📊 Data</div>
  </div>
</div>
</body>
</html>
