<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Market Landing - Orbit Background Kit</title>
<style>
body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:#f5f8ff;background:#070817}.hero{position:relative;z-index:1;min-height:100vh;display:grid;place-items:center;padding:44px 22px}.inner{max-width:860px;text-align:center}.label{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:#88d6c0;font-weight:800}.hero h1{font-size:clamp(42px,8vw,82px);line-height:.95;margin:14px 0}.hero p{font-size:19px;color:#c7d2e6}.cards{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:30px}.card{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);border-radius:8px;padding:14px 18px;font-weight:800}
</style>
</head>
<body>
<script src="../dist/orbit-bg.iife.js"></script>
<orbit-bg preset="prompt-market" z-index="0"></orbit-bg>
<main class="hero">
  <div class="inner">
    <div class="label">Prompt marketplace</div>
    <h1>Discover prompts for teams that ship faster.</h1>
    <p>A fictional marketplace landing page using the aurora preset, rings, and soft motion.</p>
    <div class="cards"><div class="card">Writing</div><div class="card">Code</div><div class="card">Research</div><div class="card">Images</div></div>
  </div>
</main>
</body>
</html>
