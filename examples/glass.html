<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Theme — Orbit Background Kit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .content { position: relative; z-index: 1; text-align: center; padding: 40px; }
  h1 { font-size: 42px; font-weight: 800; margin-bottom: 16px; }
  p { font-size: 18px; color: #555; max-width: 480px; line-height: 1.6; }
</style>
</head>
<body>
<!-- Glass theme: translucent, modern SaaS feel -->
<script src="../dist/orbit-bg.iife.js"></script>
<orbit-bg words="BUILD,SCALE,GROW,INNOVATE" theme="glass" speed="normal" opacity="0.06" grid="true" glow="true" noise="true" beams="true"></orbit-bg>
<div class="content">
  <h1>Glass Theme</h1>
  <p>Translucent glassmorphism aesthetic. Perfect for SaaS and AI tool landing pages.</p>
</div>
</body>
</html>
