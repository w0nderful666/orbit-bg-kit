<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Example — Orbit Background Kit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e8e6e3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px;
  }
  h1 { font-size: 42px; font-weight: 800; margin-bottom: 16px; }
  p { font-size: 18px; color: #888; max-width: 480px; line-height: 1.6; }
</style>
</head>
<body>

<!-- 最简用法：所有默认值 -->
<script src="../dist/orbit-bg.iife.js"></script>
<orbit-bg></orbit-bg>

<div class="content">
  <h1>Default Everything</h1>
  <p>Just two lines: one script tag, one custom element. That's it.</p>
</div>

</body>
</html>
