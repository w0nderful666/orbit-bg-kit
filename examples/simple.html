<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple - Orbit Background Kit</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#090a12;color:white}.content{position:relative;z-index:1;text-align:center;padding:24px}.content h1{font-size:clamp(32px,7vw,64px);margin:0 0 12px}.content p{color:#b9c2d0;margin:0}
</style>
</head>
<body>
<!-- Copy these two lines into any HTML page. -->
<script src="../dist/orbit-bg.iife.js"></script>
<orbit-bg theme="dark" z-index="0"></orbit-bg>

<main class="content">
  <h1>Hello Orbit</h1>
  <p>Your content stays clickable above the background.</p>
</main>
</body>
</html>
