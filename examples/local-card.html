<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Card Background - Orbit Background Kit</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:28px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#f2f4f7;color:#172034}.card{position:relative;overflow:hidden;border-radius:18px;min-height:420px;width:min(760px,100%);padding:34px;display:flex;align-items:flex-end;border:1px solid rgba(23,32,52,.12);box-shadow:0 24px 80px rgba(23,32,52,.18)}.card orbit-bg{border-radius:inherit}.content{position:relative;z-index:1;max-width:460px}.content h1{font-size:clamp(32px,6vw,58px);margin:0 0 10px}.content p{font-size:17px;color:#40506a;margin:0}
</style>
</head>
<body>
<script src="../dist/orbit-bg.iife.js"></script>

<!-- For local backgrounds, the parent needs position: relative, overflow: hidden, and a height. -->
<section class="card">
  <orbit-bg position="absolute" z-index="0" preset="glass-saas" rounded></orbit-bg>
  <div class="content">
    <h1>Local Card Background</h1>
    <p>This orbit-bg instance is clipped inside one card instead of covering the full viewport.</p>
  </div>
</section>
</body>
</html>
