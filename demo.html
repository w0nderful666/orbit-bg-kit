<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit Background Kit - Minimal Demo</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:32px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:#f4f7fb;background:#090a12}.content{position:relative;z-index:1;text-align:center;max-width:680px}.content h1{font-size:clamp(34px,7vw,68px);line-height:1;margin:0 0 14px}.content p{color:#c0c8d6;font-size:18px;margin:0 0 24px}.code{display:inline-block;text-align:left;background:rgba(0,0,0,.36);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:14px 16px;color:#dbe4f0;font:13px/1.7 "SF Mono",Consolas,monospace}.links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}.links a{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.16);border-radius:8px;padding:9px 12px;background:rgba(255,255,255,.05)}
</style>
</head>
<body>
<!-- 1. Load the component. Use the CDN URL in production. -->
<script src="dist/orbit-bg.iife.js"></script>

<!-- 2. Add one tag. Content should sit above it with z-index: 1. -->
<orbit-bg preset="open-source" z-index="0"></orbit-bg>

<main class="content">
  <h1>Orbit Background Kit</h1>
  <p>One script tag plus one Web Component for animated backgrounds.</p>
  <div class="code">&lt;script src="dist/orbit-bg.iife.js"&gt;&lt;/script&gt;<br>&lt;orbit-bg preset="open-source"&gt;&lt;/orbit-bg&gt;</div>
  <div class="links">
    <a href="index.html">Playground</a>
    <a href="examples/simple.html">Simple example</a>
    <a href="examples/local-card.html">Local card</a>
    <a href="examples/multi-instance.html">Multi instance</a>
  </div>
</main>
</body>
</html>
